# Pioneer Mini Split ESPHome Configuration

substitutions:
  node_name: my-minisplit
  device_verbose_name: "My Mini Split"

esphome:
  name: ${node_name}
  friendly_name: ${device_verbose_name}

esp8266:
  board: esp_wroom_02
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${node_name}-hotspot"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: INFO
  baud_rate: 0

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: components

uart:
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 9600
  parity: EVEN

pioneer_minisplit:
  name: "${device_verbose_name}"
  
  # Sensors (all optional)
  indoor_temp:
    name: "Indoor Temp"
  outdoor_temp:
    name: "Outdoor Temp"
  compressor_freq:
    name: "Compressor"
  current:
    name: "Current"
  
  # Switches (all optional)
  display_switch:
    name: "Display"
  beep_switch:
    name: "Beep"
  health_switch:
    name: "Health"

  # 46 °F freeze protection = 8 °C minimum-heat heater flag (TX byte10 b7 / RX byte32 b7).
  # Use EITHER heater_8c_switch OR freeze_protection_switch (same backing switch).
  # heater_8c_switch:
  #   name: "8C Heater"
  freeze_protection_switch:
    name: "Freeze Protection"
  
  # Swing / sleep selects (optional)
  sleep_select:
    name: "Sleep Mode"
  swing_vertical:
    name: "V Position"
  swing_horizontal:
    name: "H Position"

button:
  - platform: restart
    name: "Restart"
